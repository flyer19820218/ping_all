name: Wake Up All Apps
on:
  schedule:
    # 每小時執行一次
    - cron: '0 * * * *'
  workflow_dispatch:      # 讓您可以手動測試

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run ping script
        run: python ping_all.py
